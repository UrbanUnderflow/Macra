<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Macra App Store Screenshots</title>
  <style>
    :root {
      color-scheme: dark;
      --canvas-w: 1242px;
      --canvas-h: 2688px;
      --ink: #f8fbf6;
      --muted: rgba(248, 251, 246, 0.72);
      --soft: rgba(248, 251, 246, 0.52);
      --black: #080a0d;
      --panel: rgba(18, 22, 28, 0.86);
      --panel-2: rgba(255, 255, 255, 0.075);
      --line: rgba(255, 255, 255, 0.12);
      --green: #a6f42d;
      --mint: #3ddc84;
      --blue: #58b6ff;
      --cyan: #35d7de;
      --violet: #9a7cff;
      --amber: #ffbc42;
      --coral: #ff6b57;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #040506;
      font-family: var(--font);
    }

    body {
      display: grid;
      place-items: center;
    }

    .poster {
      position: relative;
      width: var(--canvas-w);
      height: var(--canvas-h);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(5, 8, 10, 0.14), rgba(5, 8, 10, 0.92) 44%, rgba(5, 8, 10, 0.98)),
        linear-gradient(135deg, rgba(166, 244, 45, 0.32), rgba(53, 215, 222, 0.12) 36%, rgba(255, 107, 87, 0.18) 100%),
        #071014;
      color: var(--ink);
      isolation: isolate;
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("../../Macra/Assets.xcassets/macraBackground.imageset/macraBackground.png");
      background-size: cover;
      background-position: center top;
      opacity: 0.38;
      mix-blend-mode: screen;
      z-index: -2;
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.08) 46%, rgba(0, 0, 0, 0.56)),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.035) 1px, transparent 1px, transparent 14px);
      z-index: -1;
      pointer-events: none;
    }

    .poster[data-tone="planner"] {
      background:
        linear-gradient(180deg, rgba(5, 8, 10, 0.2), rgba(5, 8, 10, 0.95) 47%, rgba(5, 8, 10, 1)),
        linear-gradient(135deg, rgba(255, 188, 66, 0.26), rgba(166, 244, 45, 0.18) 42%, rgba(88, 182, 255, 0.18) 100%),
        #071014;
    }

    .poster[data-tone="label"] {
      background:
        linear-gradient(180deg, rgba(5, 8, 10, 0.18), rgba(5, 8, 10, 0.95) 43%, rgba(5, 8, 10, 1)),
        linear-gradient(135deg, rgba(53, 215, 222, 0.28), rgba(154, 124, 255, 0.20) 46%, rgba(166, 244, 45, 0.14) 100%),
        #071014;
    }

    .poster[data-tone="coach"] {
      background:
        linear-gradient(180deg, rgba(5, 8, 10, 0.18), rgba(5, 8, 10, 0.94) 44%, rgba(5, 8, 10, 1)),
        linear-gradient(135deg, rgba(154, 124, 255, 0.23), rgba(88, 182, 255, 0.18) 44%, rgba(255, 107, 87, 0.15) 100%),
        #071014;
    }

    .brand {
      position: absolute;
      top: 82px;
      left: 86px;
      right: 86px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      z-index: 3;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 20px;
      min-width: 0;
    }

    .brand-icon {
      width: 92px;
      height: 92px;
      border-radius: 22px;
      background-image: url("../../Macra/Assets.xcassets/AppIcon.appiconset/AppIcon.png");
      background-size: cover;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      flex: 0 0 auto;
    }

    .brand-name {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .brand-name strong {
      font-size: 42px;
      line-height: 1;
      font-weight: 800;
    }

    .brand-name span {
      color: var(--muted);
      font-size: 24px;
      line-height: 1.1;
      font-weight: 600;
    }

    .badge {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(8, 10, 13, 0.52);
      color: var(--ink);
      border-radius: 999px;
      padding: 16px 24px;
      font-size: 24px;
      font-weight: 700;
      white-space: nowrap;
      backdrop-filter: blur(22px);
    }

    .copy {
      position: absolute;
      top: 250px;
      left: 86px;
      right: 86px;
      z-index: 3;
      display: grid;
      gap: 26px;
    }

    .eyebrow {
      display: inline-flex;
      width: max-content;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      color: var(--accent, var(--green));
      background: rgba(8, 10, 13, 0.58);
      border: 1px solid color-mix(in srgb, var(--accent, var(--green)) 46%, transparent);
      border-radius: 999px;
      font-size: 23px;
      line-height: 1;
      font-weight: 800;
      text-transform: uppercase;
      backdrop-filter: blur(22px);
    }

    .headline {
      width: 100%;
      max-width: 1070px;
      margin: 0;
      font-size: 106px;
      line-height: 0.95;
      font-weight: 900;
      text-wrap: balance;
    }

    .subtitle {
      max-width: 970px;
      margin: 0;
      color: var(--muted);
      font-size: 38px;
      line-height: 1.18;
      font-weight: 590;
      text-wrap: balance;
    }

    .stage {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 112px;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      pointer-events: none;
    }

    .phone {
      position: relative;
      width: 720px;
      height: 1572px;
      border-radius: 86px;
      padding: 28px;
      background:
        linear-gradient(145deg, #1b2028, #020305 35%, #111820 78%, #0b0d10),
        #020305;
      box-shadow:
        0 46px 90px rgba(0, 0, 0, 0.55),
        0 20px 28px rgba(0, 0, 0, 0.38),
        inset 0 0 0 2px rgba(255, 255, 255, 0.18),
        inset 0 0 0 8px rgba(0, 0, 0, 0.72);
    }

    .phone::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 28px;
      width: 220px;
      height: 42px;
      transform: translateX(-50%);
      border-radius: 0 0 24px 24px;
      background: #050608;
      z-index: 5;
    }

    .phone-screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 60px;
      background:
        linear-gradient(160deg, rgba(29, 38, 45, 0.92), rgba(7, 9, 12, 0.97) 42%, rgba(12, 16, 20, 1)),
        #090b0f;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .status {
      position: absolute;
      top: 24px;
      left: 34px;
      right: 34px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.86);
      font-size: 18px;
      font-weight: 800;
      z-index: 4;
    }

    .status-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 16px;
    }

    .status-bars i {
      width: 5px;
      background: currentColor;
      border-radius: 2px;
      display: block;
    }

    .status-bars i:nth-child(1) { height: 7px; opacity: 0.55; }
    .status-bars i:nth-child(2) { height: 10px; opacity: 0.7; }
    .status-bars i:nth-child(3) { height: 13px; opacity: 0.86; }
    .status-bars i:nth-child(4) { height: 16px; }

    .status-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .battery {
      width: 34px;
      height: 15px;
      border: 2px solid currentColor;
      border-radius: 4px;
      position: relative;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -6px;
      top: 3px;
      width: 3px;
      height: 7px;
      border-radius: 2px;
      background: currentColor;
    }

    .battery span {
      display: block;
      margin: 2px;
      width: 22px;
      height: 7px;
      border-radius: 2px;
      background: currentColor;
    }

    .app {
      position: absolute;
      inset: 0;
      padding: 86px 34px 36px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
      overflow: hidden;
    }

    .app-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(145deg, rgba(166, 244, 45, 0.16), transparent 34%),
        linear-gradient(214deg, rgba(88, 182, 255, 0.16), transparent 42%),
        linear-gradient(180deg, #111722, #07090d 55%, #080a0d);
      pointer-events: none;
    }

    .app-head {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      z-index: 1;
    }

    .app-date {
      color: var(--soft);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .app-title {
      margin: 0;
      color: #fff;
      font-size: 43px;
      line-height: 1.02;
      font-weight: 880;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #0a0c0f;
      background: var(--accent, var(--green));
      font-size: 20px;
      font-weight: 900;
      flex: 0 0 auto;
      box-shadow: 0 10px 24px color-mix(in srgb, var(--accent, var(--green)) 35%, transparent);
    }

    .app-scroll {
      position: relative;
      display: grid;
      align-content: start;
      gap: 18px;
      min-height: 0;
      z-index: 1;
    }

    .glass {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.095), rgba(255, 255, 255, 0.035)),
        rgba(12, 16, 21, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 28px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 20px 40px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(24px);
    }

    .ring-card {
      padding: 24px;
      display: grid;
      gap: 24px;
    }

    .cal-ring {
      position: relative;
      width: 270px;
      height: 270px;
      margin: 0 auto;
      border-radius: 50%;
      background:
        conic-gradient(var(--accent, var(--green)) 0deg 266deg, rgba(255, 255, 255, 0.09) 266deg 360deg);
      display: grid;
      place-items: center;
    }

    .cal-ring::before {
      content: "";
      position: absolute;
      inset: 28px;
      border-radius: inherit;
      background: #0d1117;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .cal-ring-content {
      position: relative;
      text-align: center;
      display: grid;
      gap: 4px;
    }

    .cal-number {
      font-size: 58px;
      font-weight: 900;
      line-height: 1;
      color: #fff;
    }

    .cal-label {
      color: var(--soft);
      font-size: 18px;
      font-weight: 700;
    }

    .left-pill {
      justify-self: center;
      color: var(--accent, var(--green));
      font-size: 17px;
      font-weight: 850;
      padding: 9px 14px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent, var(--green)) 15%, transparent);
    }

    .macro-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .macro {
      min-width: 0;
      display: grid;
      gap: 10px;
    }

    .macro .label,
    .section-label,
    .tiny-label {
      color: var(--soft);
      font-size: 15px;
      font-weight: 820;
      text-transform: uppercase;
    }

    .macro strong {
      color: #fff;
      font-size: 23px;
      line-height: 1;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: var(--value, 64%);
      border-radius: inherit;
      background: var(--color, var(--accent, var(--green)));
    }

    .cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 24px;
      color: #08100a;
      background: linear-gradient(135deg, var(--accent, var(--green)), #d6ff70);
      border-radius: 26px;
      font-size: 24px;
      font-weight: 900;
      box-shadow: 0 18px 42px color-mix(in srgb, var(--accent, var(--green)) 28%, transparent);
    }

    .cta span:last-child {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.14);
    }

    .meal-list {
      display: grid;
      gap: 13px;
    }

    .section-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 0 2px;
    }

    .section-top h3 {
      margin: 0;
      font-size: 27px;
      line-height: 1;
    }

    .meal-row {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      align-items: center;
      gap: 15px;
      padding: 14px;
    }

    .food-photo,
    .food-tile {
      background-size: cover;
      background-position: center;
      background-color: #18202a;
      overflow: hidden;
    }

    .food-photo {
      width: 72px;
      height: 72px;
      border-radius: 22px;
    }

    .meal-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .meal-copy strong {
      color: #fff;
      font-size: 21px;
      line-height: 1.08;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meal-copy span,
    .meal-cal,
    .caption {
      color: var(--soft);
      font-size: 16px;
      font-weight: 650;
    }

    .meal-cal {
      color: var(--accent, var(--green));
      font-weight: 900;
      white-space: nowrap;
    }

    .bottom-tabs {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      padding: 10px;
      border-radius: 28px;
      background: rgba(4, 5, 7, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(20px);
    }

    .tab {
      display: grid;
      place-items: center;
      gap: 6px;
      min-width: 0;
      color: rgba(255, 255, 255, 0.48);
      font-size: 14px;
      font-weight: 750;
      padding: 9px 4px;
      border-radius: 20px;
    }

    .tab.active {
      color: #071009;
      background: var(--accent, var(--green));
    }

    .tab i {
      font-style: normal;
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
    }

    .scanner-view {
      display: grid;
      gap: 18px;
    }

    .camera-card {
      position: relative;
      min-height: 550px;
      overflow: hidden;
      padding: 22px;
      display: grid;
      align-content: end;
    }

    .camera-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.72)),
        url("assets/bowl.jpg");
      background-size: cover;
      background-position: center;
    }

    .focus-box {
      position: absolute;
      inset: 94px 46px 150px;
      border: 4px solid rgba(166, 244, 45, 0.82);
      border-radius: 36px;
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.12), inset 0 0 32px rgba(166, 244, 45, 0.18);
    }

    .scan-result {
      position: relative;
      display: grid;
      gap: 12px;
      color: #fff;
      z-index: 1;
    }

    .scan-result h3,
    .plan-card h3,
    .label-grade h3,
    .pay-card h3 {
      margin: 0;
      color: #fff;
      font-size: 29px;
      line-height: 1.05;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .chip {
      color: #0b0e11;
      background: var(--accent, var(--green));
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 15px;
      font-weight: 900;
      white-space: nowrap;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .food-tile {
      min-height: 190px;
      border-radius: 26px;
      position: relative;
      display: grid;
      align-content: end;
      padding: 16px;
    }

    .food-tile::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.72));
    }

    .food-tile strong,
    .food-tile span {
      position: relative;
      z-index: 1;
    }

    .food-tile strong {
      color: #fff;
      font-size: 20px;
      line-height: 1.08;
    }

    .food-tile span {
      color: rgba(255, 255, 255, 0.74);
      margin-top: 5px;
      font-size: 15px;
      font-weight: 750;
    }

    .plan-hero {
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat {
      padding: 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.07);
      display: grid;
      gap: 5px;
    }

    .stat span {
      color: var(--soft);
      font-size: 14px;
      font-weight: 750;
    }

    .stat strong {
      color: #fff;
      font-size: 25px;
    }

    .plan-list {
      display: grid;
      gap: 14px;
    }

    .plan-card {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .plan-card-top {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .plan-icon {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: #071009;
      background: var(--accent, var(--green));
      font-size: 28px;
      font-weight: 950;
      flex: 0 0 auto;
    }

    .mini-meals {
      display: grid;
      gap: 9px;
    }

    .mini-meal {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      color: rgba(255, 255, 255, 0.84);
      padding: 11px 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.055);
      font-size: 17px;
      font-weight: 710;
    }

    .mini-meal span:last-child {
      color: var(--accent, var(--green));
      font-weight: 900;
    }

    .label-card {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .label-preview {
      min-height: 310px;
      border-radius: 30px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      display: grid;
      align-content: end;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.74)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.18) 0 12px, transparent 12px 32px),
        linear-gradient(135deg, #f7f7ef, #cdd7e0 45%, #efe5c5);
      background-size: cover;
      background-position: center;
    }

    .label-frame {
      position: absolute;
      left: 64px;
      right: 64px;
      top: 58px;
      bottom: 86px;
      border: 4px dashed rgba(53, 215, 222, 0.84);
      border-radius: 30px;
    }

    .label-preview strong {
      position: relative;
      z-index: 1;
      color: #fff;
      font-size: 24px;
    }

    .label-grade {
      display: grid;
      grid-template-columns: 116px 1fr;
      gap: 20px;
      align-items: center;
    }

    .grade-circle {
      width: 116px;
      height: 116px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #071009;
      background: var(--accent, var(--green));
      font-size: 58px;
      line-height: 1;
      font-weight: 950;
      box-shadow: 0 16px 36px color-mix(in srgb, var(--accent, var(--green)) 28%, transparent);
    }

    .concerns {
      display: grid;
      gap: 10px;
    }

    .concern {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.86);
      font-size: 17px;
      font-weight: 720;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent, var(--green));
    }

    .coach-shell {
      display: grid;
      gap: 16px;
    }

    .insight-card {
      padding: 20px;
      display: grid;
      gap: 12px;
    }

    .spark-line {
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      gap: 4px;
      height: 72px;
      align-items: end;
      padding-top: 8px;
    }

    .spark-line span {
      border-radius: 8px 8px 4px 4px;
      background: linear-gradient(180deg, var(--accent, var(--green)), color-mix(in srgb, var(--accent, var(--green)) 42%, #10141b));
      min-height: 14px;
      height: var(--h);
    }

    .chat {
      display: grid;
      gap: 12px;
    }

    .bubble {
      width: fit-content;
      max-width: 88%;
      padding: 16px 18px;
      border-radius: 24px;
      color: #fff;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 640;
    }

    .bubble.user {
      justify-self: end;
      color: #071009;
      background: var(--accent, var(--green));
      border-bottom-right-radius: 8px;
    }

    .bubble.nora {
      justify-self: start;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-bottom-left-radius: 8px;
    }

    .composer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--soft);
      font-size: 17px;
      font-weight: 650;
    }

    .send {
      margin-left: auto;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #071009;
      background: var(--accent, var(--green));
      font-weight: 950;
    }

    .pay-view {
      display: grid;
      gap: 18px;
    }

    .pay-hero {
      padding: 24px;
      min-height: 300px;
      display: grid;
      align-content: end;
      position: relative;
      overflow: hidden;
    }

    .pay-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("../../Macra/Assets.xcassets/macraBackground.imageset/macraBackground.png");
      background-size: cover;
      background-position: center;
      opacity: 0.56;
      filter: saturate(1.1) contrast(1.08);
    }

    .pay-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(7, 9, 12, 0.92));
    }

    .pay-hero div {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
    }

    .pay-hero h2 {
      margin: 0;
      font-size: 39px;
      line-height: 1.02;
    }

    .pay-card {
      padding: 22px;
      display: grid;
      gap: 14px;
    }

    .price-line {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
    }

    .price {
      color: #fff;
      font-size: 38px;
      line-height: 1;
      font-weight: 950;
    }

    .price small {
      color: var(--soft);
      font-size: 16px;
      font-weight: 700;
    }

    .feature-list {
      display: grid;
      gap: 10px;
    }

    .feature {
      display: flex;
      gap: 10px;
      align-items: center;
      color: rgba(255, 255, 255, 0.82);
      font-size: 17px;
      font-weight: 700;
    }

    .feature span:first-child {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #071009;
      background: var(--accent, var(--green));
      font-size: 15px;
      font-weight: 950;
    }

    @media (max-width: 1242px), (max-height: 2688px) {
      .poster {
        transform-origin: top left;
      }
    }
  </style>
</head>
<body>
  <main id="poster" class="poster" style="--accent: var(--green)" data-tone="journal">
    <section class="brand">
      <div class="brand-lockup">
        <div class="brand-icon" aria-hidden="true"></div>
        <div class="brand-name">
          <strong>Macra</strong>
          <span>Nutrition clarity</span>
        </div>
      </div>
      <div class="badge">iPhone screenshots</div>
    </section>

    <section class="copy">
      <div id="eyebrow" class="eyebrow">Food Journal</div>
      <h1 id="headline" class="headline">Track macros without the spreadsheet.</h1>
      <p id="subtitle" class="subtitle">Photo, voice, text, and repeat meals feed one clean daily dashboard.</p>
    </section>

    <section class="stage">
      <div class="phone" aria-hidden="true">
        <div class="phone-screen">
          <div class="status">
            <span>9:41</span>
            <div class="status-right">
              <div class="status-bars"><i></i><i></i><i></i><i></i></div>
              <div class="battery"><span></span></div>
            </div>
          </div>
          <div id="app"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const screens = {
      journal: {
        tone: "journal",
        accent: "var(--green)",
        eyebrow: "Food Journal",
        title: "Track macros without the spreadsheet.",
        subtitle: "Photo, voice, text, and repeat meals feed one clean daily dashboard.",
        tab: "Journal",
        render: renderJournal
      },
      scan: {
        tone: "journal",
        accent: "var(--mint)",
        eyebrow: "AI Meal Scan",
        title: "Snap a meal. Get the numbers.",
        subtitle: "Macra turns food photos into calories, macros, ingredients, and notes.",
        tab: "Scan",
        render: renderScan
      },
      planner: {
        tone: "planner",
        accent: "var(--amber)",
        eyebrow: "Meal Planning",
        title: "Plan tomorrow before dinner is over.",
        subtitle: "Reusable plans and Nora suggestions keep daily targets realistic.",
        tab: "Plan",
        render: renderPlanner
      },
      label: {
        tone: "label",
        accent: "var(--cyan)",
        eyebrow: "Label Scanner",
        title: "Decode packaged foods instantly.",
        subtitle: "Grade labels, flag ingredients, and keep healthier swaps nearby.",
        tab: "Scan",
        render: renderLabel
      },
      coach: {
        tone: "coach",
        accent: "var(--violet)",
        eyebrow: "Ask Nora",
        title: "Coaching that knows your day.",
        subtitle: "Ask about meals, targets, cravings, and patterns with your data in context.",
        tab: "More",
        render: renderCoach
      },
      plus: {
        tone: "planner",
        accent: "var(--green)",
        eyebrow: "Macra Plus",
        title: "Unlock your full nutrition system.",
        subtitle: "Premium tracking, scanning, planning, and coaching in one place.",
        tab: "More",
        render: renderPlus
      }
    };

    function imageStyle(name) {
      return `background-image: url("assets/${name}.jpg")`;
    }

    function layout(title, date, content, activeTab) {
      return `
        <div class="app-bg"></div>
        <div class="app">
          <div class="app-head">
            <div>
              <div class="app-date">${date}</div>
              <h2 class="app-title">${title}</h2>
            </div>
            <div class="avatar">TG</div>
          </div>
          <div class="app-scroll">${content}</div>
          ${tabs(activeTab)}
        </div>
      `;
    }

    function tabs(active) {
      const items = [
        ["Journal", "J"],
        ["Plan", "P"],
        ["Scan", "S"],
        ["Supps", "U"],
        ["More", "M"]
      ];
      return `
        <div class="bottom-tabs">
          ${items.map(([label, icon]) => `
            <div class="tab ${label === active ? "active" : ""}">
              <i>${icon}</i><span>${label}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderJournal() {
      const meals = [
        ["Greek yogurt berry bowl", "34P 32C 15F", "420 kcal", "yogurt"],
        ["Chicken rice bowl", "52P 62C 24F", "670 kcal", "bowl"],
        ["Protein smoothie", "38P 24C 6F", "320 kcal", "smoothie"]
      ];
      return layout("Today", "Tuesday, April 21", `
        <section class="ring-card glass">
          <div class="cal-ring">
            <div class="cal-ring-content">
              <div class="cal-number">1,410</div>
              <div class="cal-label">of 2,250 kcal</div>
              <div class="left-pill">840 left</div>
            </div>
          </div>
          <div class="macro-row">
            <div class="macro">
              <div class="label">Protein</div>
              <strong>124/180g</strong>
              <div class="bar"><span style="--value:69%;--color:var(--blue)"></span></div>
            </div>
            <div class="macro">
              <div class="label">Carbs</div>
              <strong>118/210g</strong>
              <div class="bar"><span style="--value:56%;--color:var(--green)"></span></div>
            </div>
            <div class="macro">
              <div class="label">Fat</div>
              <strong>45/75g</strong>
              <div class="bar"><span style="--value:60%;--color:var(--amber)"></span></div>
            </div>
          </div>
        </section>
        <div class="cta"><span>Log a meal</span><span>+</span></div>
        <section class="meal-list">
          <div class="section-top"><h3>Today's meals</h3><span class="section-label">3 logged</span></div>
          ${meals.map(([name, macro, cal, img]) => `
            <div class="meal-row glass">
              <div class="food-photo" style="${imageStyle(img)}"></div>
              <div class="meal-copy"><strong>${name}</strong><span>${macro}</span></div>
              <div class="meal-cal">${cal}</div>
            </div>
          `).join("")}
        </section>
        <section class="glass insight-card">
          <div class="section-label">Daily insight</div>
          <h3 style="margin:0;font-size:24px">Protein is ahead of target</h3>
          <p class="caption" style="margin:0;line-height:1.32">You are on pace for a strong recovery day. Keep dinner lighter in fat to stay near your target.</p>
        </section>
      `, "Journal");
    }

    function renderScan() {
      return layout("Scan meal", "AI meal analysis", `
        <section class="camera-card glass">
          <div class="focus-box"></div>
          <div class="scan-result">
            <div class="section-label">Detected</div>
            <h3>Salmon power bowl</h3>
            <div class="chips">
              <span class="chip">580 kcal</span>
              <span class="chip">44g protein</span>
              <span class="chip">30g carbs</span>
            </div>
          </div>
        </section>
        <section class="glass ring-card" style="padding:22px">
          <div class="section-top"><h3>Macro estimate</h3><span class="section-label">Ready to log</span></div>
          <div class="macro-row">
            <div class="macro"><div class="label">Protein</div><strong>44g</strong><div class="bar"><span style="--value:78%;--color:var(--blue)"></span></div></div>
            <div class="macro"><div class="label">Carbs</div><strong>30g</strong><div class="bar"><span style="--value:45%;--color:var(--green)"></span></div></div>
            <div class="macro"><div class="label">Fat</div><strong>28g</strong><div class="bar"><span style="--value:64%;--color:var(--amber)"></span></div></div>
          </div>
        </section>
        <section class="tile-grid">
          <div class="food-tile" style="${imageStyle("salmon")}"><strong>Photo history</strong><span>Tap to eat again</span></div>
          <div class="food-tile" style="${imageStyle("smoothie")}"><strong>Voice entry</strong><span>Logged in 12 sec</span></div>
        </section>
      `, "Scan");
    }

    function renderPlanner() {
      return layout("Meal plan", "Tomorrow's playbook", `
        <section class="plan-hero glass">
          <div>
            <div class="section-label">Target day</div>
            <h3 style="margin:6px 0 0;font-size:34px">2,250 kcal balanced cut</h3>
            <p class="caption" style="line-height:1.35;margin:8px 0 0">Built from foods you already repeat, with room for dinner flexibility.</p>
          </div>
          <div class="stat-row">
            <div class="stat"><span>Meals</span><strong>4</strong></div>
            <div class="stat"><span>Protein</span><strong>182g</strong></div>
            <div class="stat"><span>Prep</span><strong>28m</strong></div>
          </div>
        </section>
        <section class="plan-list">
          <div class="section-top"><h3>Nora plan</h3><span class="section-label">Updated now</span></div>
          <div class="plan-card glass">
            <div class="plan-card-top">
              <div class="plan-icon">P</div>
              <div><h3>Training day menu</h3><div class="caption">High protein, steady carbs</div></div>
            </div>
            <div class="mini-meals">
              <div class="mini-meal"><span>Berry yogurt bowl</span><span>420</span></div>
              <div class="mini-meal"><span>Chicken rice lunch</span><span>670</span></div>
              <div class="mini-meal"><span>Protein smoothie</span><span>320</span></div>
              <div class="mini-meal"><span>Salmon and veg</span><span>580</span></div>
            </div>
          </div>
          <div class="cta"><span>Log plan to journal</span><span>+</span></div>
        </section>
      `, "Plan");
    }

    function renderLabel() {
      return layout("Label scan", "Packaged food grading", `
        <section class="label-card glass">
          <div class="label-preview">
            <div class="label-frame"></div>
            <strong>Nutrition facts captured</strong>
          </div>
          <div class="label-grade">
            <div class="grade-circle">B</div>
            <div>
              <div class="section-label">Protein Crunch Bar</div>
              <h3>Good label, a few watch-outs.</h3>
              <p class="caption" style="line-height:1.32;margin:8px 0 0">High protein and convenient, but added sugar nudges it down.</p>
            </div>
          </div>
        </section>
        <section class="concerns">
          <div class="section-top"><h3>Ingredient flags</h3><span class="section-label">2 found</span></div>
          <div class="concern"><span class="dot"></span><span>Added sugar</span><strong>Medium</strong></div>
          <div class="concern"><span class="dot" style="background:var(--violet)"></span><span>Natural flavors</span><strong>Review</strong></div>
          <div class="concern"><span class="dot" style="background:var(--green)"></span><span>Higher-fiber swap</span><strong>A</strong></div>
        </section>
        <section class="glass insight-card">
          <div class="section-label">Better option</div>
          <h3 style="margin:0;font-size:24px">Try a lower sugar bar</h3>
          <p class="caption" style="line-height:1.32;margin:0">Similar protein, more fiber, and fewer sweeteners for steadier energy.</p>
        </section>
      `, "Scan");
    }

    function renderCoach() {
      return layout("Ask Nora", "Daily nutrition coach", `
        <section class="insight-card glass">
          <div class="section-top"><h3>Today's pattern</h3><span class="section-label">Live</span></div>
          <div class="spark-line">
            ${[38,54,48,66,78,62,82,72,92,68,76,88,74,96].map(h => `<span style="--h:${h}%"></span>`).join("")}
          </div>
          <p class="caption" style="line-height:1.32;margin:0">Protein is strong. Carbs are clustered earlier, so dinner can be lighter.</p>
        </section>
        <section class="coach-shell">
          <div class="section-top"><h3>Nora thread</h3><span class="section-label">Today</span></div>
          <div class="chat">
            <div class="bubble user">What should I eat tonight if I want to stay on target?</div>
            <div class="bubble nora">You have about 840 calories left. Aim for lean protein, vegetables, and moderate carbs.</div>
            <div class="bubble nora">A salmon bowl or turkey lettuce wraps would keep protein high without overshooting fat.</div>
            <div class="bubble user">Can I fit dessert?</div>
            <div class="bubble nora">Yes. Keep dinner near 520 calories and you have room for a 180 calorie dessert.</div>
          </div>
          <div class="composer"><span>Ask about today's meals</span><span class="send">></span></div>
        </section>
      `, "More");
    }

    function renderPlus() {
      return layout("Macra Plus", "Premium tools", `
        <section class="pay-hero glass">
          <div>
            <div class="section-label">Macra Plus</div>
            <h2>Go Plus.</h2>
            <p class="caption" style="line-height:1.32;margin:0">Meal logging, AI analysis, targets, planning, and premium insights.</p>
          </div>
        </section>
        <section class="pay-card glass">
          <div class="price-line">
            <div><div class="section-label">Most popular</div><h3>Annual</h3></div>
            <div class="price">$39.99<br><small>per year</small></div>
          </div>
          <div class="feature-list">
            <div class="feature"><span>+</span><span>Unlimited meal and label scans</span></div>
            <div class="feature"><span>+</span><span>Macro targets and progress trends</span></div>
            <div class="feature"><span>+</span><span>Nora meal planning and coaching</span></div>
          </div>
        </section>
        <section class="pay-card glass">
          <div class="price-line">
            <div><div class="section-label">Flexible</div><h3>Monthly</h3></div>
            <div class="price">$4.99<br><small>per month</small></div>
          </div>
          <div class="cta"><span>Start tracking smarter</span><span>+</span></div>
        </section>
      `, "More");
    }

    const key = (location.hash || "#journal").replace("#", "");
    const active = screens[key] || screens.journal;
    const poster = document.getElementById("poster");
    poster.style.setProperty("--accent", active.accent);
    poster.dataset.tone = active.tone;
    document.getElementById("eyebrow").textContent = active.eyebrow;
    document.getElementById("headline").textContent = active.title;
    document.getElementById("subtitle").textContent = active.subtitle;
    const app = document.getElementById("app");
    app.innerHTML = active.render();
    document.title = `Macra ${active.eyebrow} App Store Screenshot`;
  </script>
</body>
</html>
