		1ED881C8C7A87E72AD741ACB /* Normalize Embedded Framework Plists */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputFileListPaths = (
			);
			inputPaths = (
			);
			name = "Normalize Embedded Framework Plists";
			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Normalize embedded SwiftPM binary framework plists for App Store validation.\n# Older Firebase/gRPC binary frameworks can be packaged without keys that\n# Transporter now requires, and gRPC-C++ ships a bundle id containing `+`.\n# Any plist edit invalidates the framework signature, so touched frameworks\n# are re-signed without preserving the old signature identifier.\nset -e\n\nFRAMEWORKS_DIR=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Frameworks\"\nif [ ! -d \"$FRAMEWORKS_DIR\" ]; then\n  exit 0\nfi\n\nIDENTITY=\"${EXPANDED_CODE_SIGN_IDENTITY:-${CODE_SIGN_IDENTITY:--}}\"\nAPP_VERSION=\"${MARKETING_VERSION:-1.0}\"\nBUILD_VERSION=\"${CURRENT_PROJECT_VERSION:-1}\"\nMIN_OS_VERSION=\"${IPHONEOS_DEPLOYMENT_TARGET:-16.4}\"\n\nensure_plist_value() {\n  PLIST_FILE=\"$1\"\n  PLIST_KEY=\"$2\"\n  PLIST_TYPE=\"$3\"\n  PLIST_VALUE=\"$4\"\n\n  EXISTING_VALUE=\"$(/usr/libexec/PlistBuddy -c \"Print :${PLIST_KEY}\" \"$PLIST_FILE\" 2>/dev/null || true)\"\n  if [ -n \"$EXISTING_VALUE\" ]; then\n    return\n  fi\n\n  if /usr/libexec/PlistBuddy -c \"Print :${PLIST_KEY}\" \"$PLIST_FILE\" >/dev/null 2>&1; then\n    /usr/libexec/PlistBuddy -c \"Set :${PLIST_KEY} ${PLIST_VALUE}\" \"$PLIST_FILE\"\n  else\n    /usr/libexec/PlistBuddy -c \"Add :${PLIST_KEY} ${PLIST_TYPE} ${PLIST_VALUE}\" \"$PLIST_FILE\"\n  fi\n  MODIFIED=1\n}\n\nfor FRAMEWORK_DIR in \"$FRAMEWORKS_DIR\"/*.framework; do\n  [ -d \"$FRAMEWORK_DIR\" ] || continue\n  INFO_PLIST=\"${FRAMEWORK_DIR}/Info.plist\"\n  [ -f \"$INFO_PLIST\" ] || continue\n\n  MODIFIED=0\n  FRAMEWORK_NAME=\"$(basename \"$FRAMEWORK_DIR\")\"\n\n  if [ \"$FRAMEWORK_NAME\" = \"gRPC-C++.framework\" ]; then\n    BUNDLE_ID=\"$(/usr/libexec/PlistBuddy -c \"Print :CFBundleIdentifier\" \"$INFO_PLIST\" 2>/dev/null || true)\"\n    if [ \"$BUNDLE_ID\" != \"com.firebase.FirebasegRPCCxx\" ]; then\n      if [ -n \"$BUNDLE_ID\" ]; then\n        /usr/libexec/PlistBuddy -c \"Set :CFBundleIdentifier com.firebase.FirebasegRPCCxx\" \"$INFO_PLIST\"\n      else\n        /usr/libexec/PlistBuddy -c \"Add :CFBundleIdentifier string com.firebase.FirebasegRPCCxx\" \"$INFO_PLIST\"\n      fi\n      MODIFIED=1\n    fi\n  fi\n\n  FRAMEWORK_VERSION=\"$(/usr/libexec/PlistBuddy -c \"Print :CFBundleVersion\" \"$INFO_PLIST\" 2>/dev/null || true)\"\n  if [ -z \"$FRAMEWORK_VERSION\" ]; then\n    FRAMEWORK_VERSION=\"$APP_VERSION\"\n  fi\n\n  ensure_plist_value \"$INFO_PLIST\" CFBundleShortVersionString string \"$FRAMEWORK_VERSION\"\n  ensure_plist_value \"$INFO_PLIST\" CFBundleVersion string \"$BUILD_VERSION\"\n  ensure_plist_value \"$INFO_PLIST\" MinimumOSVersion string \"$MIN_OS_VERSION\"\n\n  if [ \"$MODIFIED\" = \"1\" ] && [ \"${CODE_SIGNING_ALLOWED:-YES}\" != \"NO\" ]; then\n    rm -rf \"${FRAMEWORK_DIR}/_CodeSignature\"\n    /usr/bin/codesign --force --sign \"$IDENTITY\" --generate-entitlement-der --timestamp=none \"$FRAMEWORK_DIR\"\n  fi\ndone\n";
		};
